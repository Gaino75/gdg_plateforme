
server:
  port: ${PORT:8086}

spring:
  application:
    name: gdg-service-paiement
  cloud:
    config:
      enabled: false
  # datasource:
  #   url: jdbc:postgresql://aws-0-eu-west-3.pooler.supabase.com:6543/postgres
  #   username: postgres.lfndwsyzicnktfxmgxhw
  #   password: gdg@2026!Secure
  #   driver-class-name: org.postgresql.Driver
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/gdg_auth}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:JOJOloj}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: paiement_schema
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

logging:
  level:
    com.gdg.paiement: DEBUG
    org.springframework.web: INFO

services:
  reservations:
    url: ${RESERVATIONS_SERVICE_URL:http://localhost:8085}

