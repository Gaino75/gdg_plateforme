server:
  port: 8083

spring:
  application:
    name: gdg-service-stock

  datasource:
    url: jdbc:postgresql://localhost:5432/gdg_stock_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: stock_schema

  config:
    import: "optional:configserver:"

logging:
  level:
    com.gdg: DEBUG
    org.hibernate.SQL: DEBUG