server:
  port: ${PORT:8083}

spring:
  application:
    name: gdg-service-stock
        
    # datasource:
    #   url: jdbc:postgresql://aws-0-eu-west-3.pooler.supabase.com:6543/postgres
    #   username: postgres.lfndwsyzicnktfxmgxhw
    #   password: gdg@2026!Secure
    #   driver-class-name: org.postgresql.Driver

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/gdg_plateforme}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: stock_schema

  config:
    import: "optional:configserver:"

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

logging:
  level:
    com.gdg: DEBUG
    org.hibernate.SQL: DEBUG

gdg:
  auth:
    url: ${AUTH_SERVICE_URL:http://localhost:8081}