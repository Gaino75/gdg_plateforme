spring:
  datasource:
    url: jdbc:h2:mem:auth_test;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: auth_schema
  rabbitmq:
    listener:
      simple:
        auto-startup: false
