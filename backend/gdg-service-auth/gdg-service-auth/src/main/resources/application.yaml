server:
  port: ${PORT:8081}
  error:
    include-message: always
    include-stacktrace: always

spring:
  application:
    name: gdg-service-auth
  main:
    allow-bean-definition-overriding: true 
  cloud:
    config:
      enabled: false
  # datasource:
  #   url: jdbc:postgresql://aws-0-eu-west-3.pooler.supabase.com:6543/postgres
  #   username: postgres.lfndwsyzicnktfxmgxhw
  #   password: gdg@2026!Secure
  #   driver-class-name: org.postgresql.Driver

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/gdg_auth}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:JOJOloj}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: auth_schema
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

jwt:
  secret: ${JWT_SECRET:$sage-meliodas-GAZ-2026-secret-key-secure-2556bits}
  expiration: ${JWT_EXPIRATION:3600000}

logging:
  level:
    com.gdg.auth: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    root: ERROR