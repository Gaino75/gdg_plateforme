  datasource:
    url: jdbc:postgresql://localhost:5432/gdg_auth
    username: postgres
    password: JOJOloj
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: admin_schema

logging:
  level:
    com.gdg.admin: DEBUG
    org.springframework.web: INFO

gdg:
  agences:
    url: http://localhost:8082
  auth:
    url: http://localhost:8081
  stock:
    url: http://localhost:8083
  notifications:
    url: http://localhost:8087
    

