# ============================================================
# CONFIGURATION DU SERVICE AGENCES
# ============================================================

spring.application.name=service-agences
server.port=8082

# ============================================================
# CONNEXION À POSTGRESQL
# ============================================================

spring.datasource.url= jdbc:postgresql://localhost:5432/gdg_auth
spring.datasource.username=postgres 
spring.datasource.password=JOJOloj
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / HIBERNATE
# ============================================================

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=agences_schema
# ⚠️ 'validate' = vérifie que les tables existent, ne les modifie pas

# ============================================================
# CONFIG SERVER
# ============================================================

spring.config.import=optional:configserver:http://localhost:8888

# ============================================================
# UPLOAD DES FICHIERS
# ============================================================

app.upload.dir=./uploads
app.upload.base-url=/uploads
gdg.auth.url=http://localhost:8081
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ============================================================
# LOGGING
# ============================================================

logging.level.com.gdg.service_agences=DEBUG