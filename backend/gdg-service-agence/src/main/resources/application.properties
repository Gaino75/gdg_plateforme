# ============================================================
# CONFIGURATION DU SERVICE AGENCES
# ============================================================

spring.application.name=service-agences
server.port=${PORT:8082}

# ============================================================
# CONNEXION À POSTGRESQL
# ============================================================

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/gdg_auth}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:JOJOloj}
spring.datasource.driver-class-name=org.postgresql.Driver


# ============================================================
# CONNEXION A LA BASE DE DONNEE EN LIGNE SUR SUPABASE
# ============================================================

