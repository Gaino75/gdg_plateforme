spring.application.name=gdg-config-server
server.port=8888

# ============================================================
# MODE NATIVE (fichiers locaux, pas de Git)
# ============================================================
spring.profiles.active=native
spring.cloud.config.server.native.search-locations=classpath:/configs

# ============================================================
# LOGGING
# ============================================================
logging.level.com.gdg.configserver=DEBUG

# ============================================================
# MODE GIT (les configs sont dans un repo Git)
# ============================================================
