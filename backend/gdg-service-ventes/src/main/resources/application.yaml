spring:
  application:
    name: gdg-service-ventes
  
  cloud:
    config:
      enabled: false

  # datasource:
  #   url: jdbc:postgresql://aws-0-eu-west-3.pooler.supabase.com:6543/postgres
  #   username: postgres.lfndwsyzicnktfxmgxhw
  #   password: gdg@2026!Secure
  #   driver-class-name: org.postgresql.Driver
  
  datasource:
   url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/gdg_plateforme}
   username: ${DATABASE_USERNAME:postgres}
   password: ${DATABASE_PASSWORD:12345}
   driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: true
        default_schema: ventes_schema
    open-in-view: false

server:
  port: ${PORT:8084}

logging:
  level:
    com.gdg: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

services:
  stock:
    url: ${STOCK_SERVICE_URL:http://localhost:8083}
gdg:
  auth:
    url: ${AUTH_SERVICE_URL:http://localhost:8081}