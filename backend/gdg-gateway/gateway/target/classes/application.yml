# ================================================================
# CONFIGURATION DE L'API GATEWAY — PROJET GPG
# ================================================================

server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: service-auth
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/**

        - id: service-agences
          uri: ${AGENCES_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/agences/**, /api/enseignes/**, /api/villes/**

        - id: service-stock
          uri: ${STOCK_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/stocks/**, /api/categories/**

        - id: service-ventes
          uri: ${VENTES_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/ventes/**, /api/approvisionnements/**, /api/factures/**

        - id: service-reservations
          uri: ${RESERVATIONS_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/reservations/**

        - id: service-paiement
          uri: ${PAIEMENT_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/paiements/**

        - id: service-notifications
          uri: ${NOTIFICATIONS_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/notifications/**, /api/abonnements/**, /api/signalements/**

        - id: service-admin
          uri: ${ADMIN_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/admin/**

jwt:
  secret: ${JWT_SECRET:$sage-meliodas-GAZ-2026-secret-key-secure-2556bits}

logging:
  level:
    com.gdg.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
